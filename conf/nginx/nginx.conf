user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # include /etc/nginx/conf.d/*.conf;


    upstream docker-ioagent-ui-spa {
        server iotagent-ui-spa:80;
    }

    upstream docker-keycloak {
        server keycloak:8080;
    }

    upstream docker-grafana {
        server grafana:3000;
    }

    upstream docker-nifi {
        server draco:8443;
    }

    upstream minio {
        server minio1:9000;
        server minio2:9000;
        server minio3:9000;
        server minio4:9000;
    }

    upstream console {
        ip_hash;
        server minio1:9001;
        server minio2:9001;
        server minio3:9001;
        server minio4:9001;
    }

    upstream docker-pgadmin {
        server pgadmin:80;
    }

    upstream docker-kong {
        server kong:8000;
    }

    server {
        listen       80;
        server_name  localhost;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
	    server_name localhost;
        ssl_certificate     /etc/nginx/cert.crt;
        ssl_certificate_key /etc/nginx/cert.key;

        # To allow special characters in headers
        ignore_invalid_headers off;
        
        # To disable buffering
        proxy_buffering off;
        proxy_request_buffering off;

        location /draco {
            proxy_pass https://docker-nifi/;
            
            proxy_set_header X-ProxyScheme https;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
	    
            proxy_set_header X-ProxyContextPath "/draco";
	        proxy_set_header X-ProxyScheme "https";
            proxy_set_header X-ProxyHost "localhost";
            proxy_set_header X-ProxyPort "443";

	        rewrite /draco/(.*) /$1 break;
        }

        location /nifi-api {
            proxy_pass https://docker-nifi;
            
	        proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
	    
            proxy_set_header X-ProxyContextPath /nifi;

            rewrite ^/nifi-api/(.*) /$1 break;
        }

        location /iotagentui {
            proxy_pass http://docker-ioagent-ui-spa/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            rewrite ^/iotagentui/(.*) /$1 break;
        }

        location /auth {
            proxy_pass http://docker-keycloak/auth;
            proxy_redirect off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 443;
        }

        location /grafana {
            proxy_pass http://docker-grafana/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            rewrite ^/grafana/(.*) /$1 break;
        }

        location /minio/ui/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-NginX-Proxy true;

            # This is necessary to pass the correct IP to be hashed
            real_ip_header X-Real-IP;

            proxy_connect_timeout 300;
            
            # To support websocket
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            chunked_transfer_encoding off;

            proxy_pass http://console;
            rewrite ^/minio/ui/(.*) /$1 break;
        }

        location /pgadmin {
            proxy_pass http://docker-pgadmin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Script-Name /pgadmin;

            rewrite ^/pgadmin/(.*) /$1 break;
        }

        location /api {
            proxy_pass http://docker-kong/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            rewrite ^/api/(.*) /$1 break;
        }

    }
}